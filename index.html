<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hazugság vagy Igazság?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">

  <!-- ===== FŐMENÜ ===== -->
  <div id="start-screen" class="screen active">

    <div class="menu-hero">
      <div class="menu-logo">🤔</div>
      <h1>Hazugság vagy Igazság?</h1>
      <p class="menu-desc">Döntsd el – igaz vagy hamis?</p>
    </div>

    <!-- PROFIL KÁRTYA -->
    <div class="profile-card" id="profile-card">
      <div class="profile-left">
        <div class="profile-avatar" id="profile-avatar">🧠</div>
        <div class="profile-info">
          <div class="profile-rank" id="profile-rank">Kezdő</div>
          <div class="profile-xp-bar-wrap">
            <div class="profile-xp-bar" id="profile-xp-bar"></div>
          </div>
          <div class="profile-xp-label" id="profile-xp-label">0 / 100 XP</div>
        </div>
      </div>
      <div class="profile-stats-row">
        <div class="pstat">
          <span class="pstat-num" id="ps-games">0</span>
          <span class="pstat-label">Meccs</span>
        </div>
        <div class="pstat">
          <span class="pstat-num green" id="ps-correct">0</span>
          <span class="pstat-label">Helyes</span>
        </div>
        <div class="pstat">
          <span class="pstat-num blue" id="ps-accuracy">0%</span>
          <span class="pstat-label">Pontosság</span>
        </div>
        <div class="pstat">
          <span class="pstat-num yellow" id="ps-streak">0</span>
          <span class="pstat-label">Legjobb sor</span>
        </div>
        <div class="pstat">
          <span class="pstat-num purple" id="ps-xp">0</span>
          <span class="pstat-label">Össz XP</span>
        </div>
      </div>
    </div>

    <!-- KATEGÓRIA -->
    <div class="menu-section">
      <h3 class="section-title">📂 Kategória</h3>
      <div class="option-grid" id="category-grid">
        <button class="option-card selected" data-value="all" onclick="selectOption('category-grid',this)">
          <span class="opt-icon">🌍</span><span class="opt-label">Minden</span>
        </button>
        <button class="option-card" data-value="science" onclick="selectOption('category-grid',this)">
          <span class="opt-icon">🔬</span><span class="opt-label">Tudomány</span>
        </button>
        <button class="option-card" data-value="history" onclick="selectOption('category-grid',this)">
          <span class="opt-icon">📜</span><span class="opt-label">Történelem</span>
        </button>
        <button class="option-card" data-value="nature" onclick="selectOption('category-grid',this)">
          <span class="opt-icon">🌿</span><span class="opt-label">Természet</span>
        </button>
        <button class="option-card" data-value="fun" onclick="selectOption('category-grid',this)">
          <span class="opt-icon">😄</span><span class="opt-label">Érdekességek</span>
        </button>
      </div>
    </div>

    <!-- NEHÉZSÉG -->
    <div class="menu-section">
      <h3 class="section-title">⚡ Nehézség</h3>
      <div class="option-grid" id="difficulty-grid">
        <button class="option-card selected" data-value="all" onclick="selectOption('difficulty-grid',this)">
          <span class="opt-icon">🌍</span><span class="opt-label">Minden szint</span>
        </button>
        <button class="option-card diff-easy" data-value="easy" onclick="selectOption('difficulty-grid',this)">
          <span class="opt-icon">😊</span><span class="opt-label">Könnyű</span><span class="opt-sub">Közismert tények</span>
        </button>
        <button class="option-card diff-medium" data-value="medium" onclick="selectOption('difficulty-grid',this)">
          <span class="opt-icon">🤔</span><span class="opt-label">Közepes</span><span class="opt-sub">Kicsit trükkös</span>
        </button>
        <button class="option-card diff-hard" data-value="hard" onclick="selectOption('difficulty-grid',this)">
          <span class="opt-icon">🔥</span><span class="opt-label">Nehéz</span><span class="opt-sub">Igazi kihívás</span>
        </button>
      </div>
    </div>

    <button class="btn btn-play" onclick="startGame()">▶ Játék indítása</button>
    <div class="menu-footer">🎯 <strong id="q-count-preview">120</strong> kérdés elérhető</div>
  </div>

  <!-- ===== JÁTÉK KÉPERNYŐ ===== -->
  <div id="game-screen" class="screen">
    <header class="game-header">
      <button class="btn-home" onclick="goHome()">🏠</button>
      <div class="score-board">
        <span class="score-item correct">✅ <span id="correct-count">0</span></span>
        <span class="score-item wrong">❌ <span id="wrong-count">0</span></span>
        <span class="score-item total">📋 <span id="question-num">1</span>/<span id="total-questions">0</span></span>
      </div>
      <div class="diff-badge" id="diff-badge">😊 Könnyű</div>
    </header>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="question-card" id="question-card">
      <div class="category-badge" id="category-badge">🔬 Tudomány</div>
      <p class="question-text" id="question-text">Töltés...</p>
    </div>
    <div class="explanation-box" id="explanation-box"></div>
    <div class="buttons">
      <button class="btn btn-true" id="btn-true" onclick="answer(true)">✅ IGAZ</button>
      <button class="btn btn-false" id="btn-false" onclick="answer(false)">❌ HAMIS</button>
    </div>
    <button class="btn btn-next" id="btn-next" onclick="nextQuestion()" style="display:none;">Következő ➡️</button>
  </div>

  <!-- ===== EREDMÉNY KÉPERNYŐ ===== -->
  <div id="result-screen" class="screen">
    <div class="result-card">
      <div class="result-icon" id="result-icon">🏆</div>
      <h2 id="result-title">Játék vége!</h2>
      <p id="result-message"></p>
      <div class="result-xp-box" id="result-xp-box"></div>
      <div class="result-stats">
        <div class="stat"><span class="stat-num green" id="final-correct">0</span><span class="stat-label">Helyes</span></div>
        <div class="stat"><span class="stat-num red" id="final-wrong">0</span><span class="stat-label">Helytelen</span></div>
        <div class="stat"><span class="stat-num blue" id="final-percent">0%</span><span class="stat-label">Pontosság</span></div>
        <div class="stat"><span class="stat-num yellow" id="final-xp">+0</span><span class="stat-label">XP nyerve</span></div>
      </div>
      <button class="btn btn-play" onclick="restartGame()">🔄 Újra játszom!</button>
      <button class="btn btn-secondary" onclick="goHome()">🏠 Főmenü</button>
    </div>
  </div>

</div>
<script src="questions.js"></script>
<script src="game.js"></script>
</body>
</html>
